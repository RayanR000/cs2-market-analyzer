name: Aggregator Market Update (17k Items)

on:
  schedule:
    # Every 6 hours on the EST optimized schedule
    # 11:30 PM EST = 03:30 UTC
    # 05:30 AM EST = 09:30 UTC
    # 11:30 AM EST = 15:30 UTC
    # 05:30 PM EST = 21:30 UTC
    - cron: '30 3,9,15,21 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  collect-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Aggregator Task
        working-directory: ./backend
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}
          ENVIRONMENT: production
          DEBUG: false
        run: python scripts/run_task.py aggregate
