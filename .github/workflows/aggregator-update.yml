name: Aggregator Market Update (17k Items)

on:
  schedule:
    # Every 6 hours — runs before daily trend analysis (03:00 UTC) and forecast (04:00 UTC)
    # 10:30 PM EST = 02:30 UTC (previous day)
    # 05:30 AM EST = 09:30 UTC
    # 11:30 AM EST = 15:30 UTC
    # 05:30 PM EST = 21:30 UTC
    - cron: '30 2,9,15,21 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  collect-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Aggregator Task
        working-directory: ./backend
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}
          ENVIRONMENT: production
          DEBUG: false
        run: |
          echo "🚀 Starting aggregator market update..."
          python scripts/run_task.py aggregate 2>&1 | tee aggregator.log
          EXIT_CODE=$?
          echo "✅ Aggregator task completed with exit code: $EXIT_CODE"

      - name: Notify on failure
        if: failure() && github.event_name == 'schedule'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "[${{ github.workflow }}] Failed - $(date +%F)" \
            --body "Workflow **${{ github.workflow }}** failed.

          Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          Branch: ${{ github.ref_name }}
          Trigger: ${{ github.event_name }}" \
            --label "automation" 2>/dev/null || true

      - name: Upload aggregator logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aggregator-logs-${{ github.run_id }}
          path: backend/aggregator.log
          retention-days: 30
