name: Aggregator Market Update

on:
  schedule:
    # Once daily at 23:00 UTC (7:00 PM EDT). CSGOTrader regenerates its price
    # dumps once a day around ~21:40 UTC (verified via Last-Modified headers
    # and 5 weeks of collected data — extra same-day runs always returned
    # identical prices). 23:00 leaves buffer for upstream drift and Actions
    # cron delay, keeps timestamps on the same calendar day as the prices,
    # and leaves time for the forecast chain (runs ~01:00 UTC).
    - cron: '0 23 * * *'
  workflow_dispatch: # Allow manual trigger

defaults:
  run:
    shell: bash

permissions:
  issues: write
  contents: write # push daily price dumps to the data-archive branch

jobs:
  collect-data:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Aggregator Task
        working-directory: ./backend
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}
          ENVIRONMENT: production
          DEBUG: false
        run: |
          echo "🚀 Starting aggregator market update..."
          set -o pipefail
          python scripts/run_task.py aggregate 2>&1 | tee aggregator.log

      # Snapshot-tier items keep only their latest row in Supabase, so each
      # day's collection is dumped to the data-archive branch as the durable
      # record of their price history.
      - name: Checkout data-archive branch
        uses: actions/checkout@v4
        with:
          ref: data-archive
          path: archive

      - name: Merge hourly player counts
        run: |
          DATE=$(date -u +%Y-%m-%d)
          ARCHIVE_CSV="archive/price-archive/player-counts/${DATE}.csv"
          TMP_CSV="/tmp/player-counts/${DATE}.csv"
          mkdir -p /tmp/player-counts
          if [ -f "$ARCHIVE_CSV" ]; then
            echo "Merging hourly player counts from archive..."
            if [ ! -f "$TMP_CSV" ]; then
              head -1 "$ARCHIVE_CSV" > "$TMP_CSV"
            fi
            tail -n +2 "$ARCHIVE_CSV" >> "$TMP_CSV"
            sort -u -t, -k1 "$TMP_CSV" -o "$TMP_CSV"
            echo "Merged: $(wc -l < "$TMP_CSV") readings (with header)"
          else
            echo "No hourly player counts found in archive"
          fi

      - name: Append to Parquet archive
        working-directory: ./backend
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}
          ENVIRONMENT: production
          DEBUG: false
        run: >
          python scripts/append_to_parquet.py
          --date $(date -u +%F)
          --out-dir ../archive
          --snapshot-csv /tmp/aggregator-snapshots-$(date -u +%F).csv
          --backfilled-csv /tmp/aggregator-backfilled-$(date -u +%F).csv
          --exchange-rates-csv /tmp/exchange-rates-$(date -u +%F).csv
          --player-counts-csv /tmp/player-counts/$(date -u +%F).csv

      - name: Commit snapshot to data-archive
        working-directory: ./archive
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add price-archive
          git commit -m "archive: prices + exchange-rates + player-counts $(date -u +%F)" || echo "nothing to commit"
          git push

      - name: Notify on failure
        if: failure() && github.event_name == 'schedule'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "[${{ github.workflow }}] Failed - $(date +%F)" \
            --body "Workflow **${{ github.workflow }}** failed.

          Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          Branch: ${{ github.ref_name }}
          Trigger: ${{ github.event_name }}" \
            --label "automation" 2>/dev/null || true

      - name: Upload aggregator logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aggregator-logs-${{ github.run_id }}
          path: backend/aggregator.log
          retention-days: 30
