name: Database Maintenance (Pruning)

on:
  schedule:
    # Every Sunday at 4:00 AM EST
    # 04:00 AM EST = 08:00 UTC
    - cron: '0 8 * * 0'
  workflow_dispatch: # Allow manual trigger

jobs:
  maintenance:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Pruning Task
        working-directory: ./backend
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}
          ENVIRONMENT: production
          DEBUG: false
        run: |
          echo "🧹 Starting database maintenance..."
          python scripts/run_task.py prune 2>&1 | tee maintenance.log
          EXIT_CODE=$?
          echo "✅ Maintenance task completed with exit code: $EXIT_CODE"

      - name: Upload maintenance logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maintenance-logs-${{ github.run_id }}
          path: backend/maintenance.log
          retention-days: 7
