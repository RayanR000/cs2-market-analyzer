name: Long-Term Trend Analysis

on:
  schedule:
    # Every Monday at 2:00 AM EST (6:00 UTC)
    - cron: '0 6 * * 1'
  workflow_dispatch: # Allow manual trigger

jobs:
  analysis:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Long-Term Trend Analysis
        working-directory: ./backend
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}
          ENVIRONMENT: production
          DEBUG: false
        run: |
          echo "📊 Starting long-term trend analysis..."
          python scripts/run_task.py long_term_trends 2>&1 | tee analysis.log
          EXIT_CODE=$?
          echo "✅ Analysis completed with exit code: $EXIT_CODE"

      - name: Upload analysis logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: long-term-analysis-logs-${{ github.run_id }}
          path: backend/analysis.log
          retention-days: 7
