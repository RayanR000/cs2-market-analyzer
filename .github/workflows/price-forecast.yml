name: Price Forecast

on:
  schedule:
    # Daily at 4:00 AM UTC (after trend analysis completes at 3:00)
    - cron: '0 4 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Forecast mode'
        required: true
        default: 'predict-only'
        type: choice
        options:
          - predict-only
          - train-only
          - full

jobs:
  forecast:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Determine run mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ inputs.mode }}" >> $GITHUB_OUTPUT
          elif [ "$(date +%u)" = "1" ]; then
            # Monday: full retrain + predict
            echo "mode=full" >> $GITHUB_OUTPUT
          else
            echo "mode=predict-only" >> $GITHUB_OUTPUT
          fi

      - name: Run ML price forecasting
        working-directory: ./backend
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}
          ENVIRONMENT: production
          DEBUG: false
        run: |
          echo "🔮 Mode: ${{ steps.mode.outputs.mode }}"
          case "${{ steps.mode.outputs.mode }}" in
            predict-only)
              python scripts/forecast_prices.py --predict-only 2>&1 | tee forecast.log
              ;;
            train-only)
              python scripts/forecast_prices.py --train-only 2>&1 | tee forecast.log
              ;;
            full)
              python scripts/forecast_prices.py 2>&1 | tee forecast.log
              ;;
          esac
          EXIT_CODE=$?
          echo "✅ Price forecast completed with exit code: $EXIT_CODE"

      - name: Upload forecast logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: forecast-logs-${{ github.run_id }}
          path: backend/forecast.log
          retention-days: 7
