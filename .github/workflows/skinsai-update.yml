name: SkinsAI Price Update

on:
  schedule:
    # Every 6 hours. skins.ai is a free, no-key, no-cookie API with responses
    # edge-cached ~5-60 min, so a single bulk catalog call is fast and cheap.
    # Four runs/day capture intraday moves far better than the once-daily
    # CSGOTrader dump, while staying well within reasonable-use bounds.
    - cron: '0 */6 * * *'
  workflow_dispatch:

defaults:
  run:
    shell: bash

permissions:
  issues: write
  contents: write # push daily price dumps to the data-archive branch

jobs:
  collect-skinsai:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Database Migration
        working-directory: ./backend
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}
          ENVIRONMENT: production
          DEBUG: false
        run: python scripts/run_task.py migrate

      - name: Run SkinsAI Collection
        working-directory: ./backend
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}
          ENVIRONMENT: production
          DEBUG: false
        run: |
          echo "🚀 Starting skins.ai price collection..."
          set -o pipefail
          python scripts/run_task.py skinsai 2>&1 | tee skinsai.log

      - name: Checkout data-archive branch
        uses: actions/checkout@v4
        with:
          ref: data-archive
          path: archive

      - name: Append to Parquet archive
        working-directory: ./backend
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}
          ENVIRONMENT: production
          DEBUG: false
        run: >
          python scripts/append_to_parquet.py
          --date $(date -u +%F)
          --out-dir ../archive
          --snapshot-csv /tmp/skinsai-snapshots-$(date -u +%F).csv

      - name: Commit snapshot to data-archive
        working-directory: ./archive
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin data-archive || true
          git add price-archive
          git commit -m "archive: skins.ai prices $(date -u +%F)" || echo "nothing to commit"
          git push

      - name: Notify on failure
        if: failure() && github.event_name == 'schedule'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "[${{ github.workflow }}] Failed - $(date +%F)" \
            --body "Workflow **${{ github.workflow }}** failed.

          Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          Branch: ${{ github.ref_name }}
          Trigger: ${{ github.event_name }}" \
            --label "automation" 2>/dev/null || true

      - name: Upload skinsai logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: skinsai-logs-${{ github.run_id }}
          path: backend/skinsai.log
          retention-days: 30
