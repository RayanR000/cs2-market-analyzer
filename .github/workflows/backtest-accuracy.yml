name: Backtest Accuracy

on:
  # Daily: evaluate live forecasts
  workflow_run:
    workflows: ["Price Forecast"]
    types: [completed]
  schedule:
    - cron: '0 8 * * 1-6'
  workflow_dispatch:
    inputs:
      type:
        description: 'Backtest type (forecast only)'
        required: false
        default: 'forecast'
        type: choice
        options:
          - forecast

defaults:
  run:
    shell: bash

permissions:
  issues: write

jobs:
  backtest:
    # Run on: manual trigger, chained from forecast, or standalone cron (08:00 UTC)
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Checkout price archive
        uses: actions/checkout@v4
        with:
          ref: data-archive
          path: archive
          fetch-depth: 1

      - name: Link price-archive
        run: ln -s $PWD/archive/price-archive price-archive

      - name: Run forecast backtest
        working-directory: ./backend
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}
          ENVIRONMENT: production
          DEBUG: false
        run: |
          echo "Running forecast backtest..."
          python scripts/backtest_accuracy.py --type forecast 2>&1 | tee backtest.log

      - name: Notify on failure
        if: failure() && github.event_name == 'workflow_run'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "[${{ github.workflow }}] Failed - $(date +%F)" \
            --body "Workflow **${{ github.workflow }}** failed.

          Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          Branch: ${{ github.ref_name }}
          Trigger: ${{ github.event_name }}" \
            --label "automation" 2>/dev/null || true

      - name: Upload backtest logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backtest-logs-${{ github.run_id }}
          path: backend/backtest.log
          retention-days: 30
