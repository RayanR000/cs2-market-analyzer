name: Supply Scraper

on:
  schedule:
    # Run daily at 22:00 UTC, before the aggregator (23:00 UTC).
    # Supply snapshots are ready for the forecast chain that follows.
    - cron: '0 22 * * *'
  workflow_dispatch:

defaults:
  run:
    shell: bash

permissions:
  issues: write
  contents: read

jobs:
  scrape-supply:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run migration
        working-directory: ./backend
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}
          ENVIRONMENT: production
          DEBUG: false
        run: |
          python -m alembic upgrade head

      - name: Run Supply Scraper
        working-directory: ./backend
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}
          ENVIRONMENT: production
          DEBUG: false
        run: |
          echo "🚀 Starting supply scraper..."
          set -o pipefail
          python scripts/run_task.py supply_scrape 2>&1 | tee supply_scraper.log

      - name: Notify on failure
        if: failure() && github.event_name == 'schedule'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "[${{ github.workflow }}] Failed - $(date +%F)" \
            --body "Workflow **${{ github.workflow }}** failed.

          Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          Branch: ${{ github.ref_name }}
          Trigger: ${{ github.event_name }}" \
            --label "automation" 2>/dev/null || true

      - name: Upload supply scraper logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: supply-scraper-logs-${{ github.run_id }}
          path: backend/supply_scraper.log
          retention-days: 30
