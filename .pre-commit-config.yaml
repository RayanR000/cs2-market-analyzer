repos:
-   repo: https://github.com/Yelp/detect-secrets
    rev: v1.6.2
    hooks:
    - id: detect-secrets
      args: [--baseline, .secrets.baseline]

-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.4.0
    hooks:
    - id: check-added-large-files
      args: ['--maxkb=1024']
